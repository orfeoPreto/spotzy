faq:
  title: "Frequently asked questions"
  q1_q: "How do you decide my earnings?"
  q1_a: "You set your own hourly rate. We only take a small platform fee — 0% for the first 3 months, then 10%."
  q2_q: "Who is liable if something happens to my parking?"
  q2_a: "Spotzy provides host protection for every booking. Our terms cover liability during the booked period."
  q3_q: "How do I get paid?"
  q3_a: "Payouts go directly to your bank account via Stripe Connect within 2-3 business days after each booking."
  q4_q: "Can I block dates?"
  q4_a: "Yes — you have full control over your availability calendar. Block any dates or time slots you need."
  q5_q: "What information is shared publicly?"
  q5_a: "Only your first name, approximate location, spot type, and rating. Your full address is shared only after a booking is confirmed."
  q6_q: "When does Spotzy open in my area?"
  q6_a: "We're launching in Forest and Saint-Gilles first. Sign up and we'll notify you as soon as your area goes live."
