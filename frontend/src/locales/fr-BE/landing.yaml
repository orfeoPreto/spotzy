faq:
  title: "Questions fréquentes"
  q1_q: "Comment fixez-vous mes revenus ?"
  q1_a: "Vous fixez vous-même votre tarif horaire. Nous ne prenons qu'une petite commission — 0 % pendant les 3 premiers mois, puis 10 %."
  q2_q: "Qui est responsable si quelque chose arrive à mon parking ?"
  q2_a: "Spotzy offre une protection hôte pour chaque réservation. Nos conditions couvrent la responsabilité pendant la période réservée."
  q3_q: "Comment suis-je payé ?"
  q3_a: "Les paiements sont versés directement sur votre compte bancaire via Stripe Connect sous 2-3 jours ouvrables après chaque réservation."
  q4_q: "Puis-je bloquer des dates ?"
  q4_a: "Oui — vous avez un contrôle total sur votre calendrier de disponibilités. Bloquez les dates ou créneaux dont vous avez besoin."
  q5_q: "Quelles informations sont partagées publiquement ?"
  q5_a: "Uniquement votre prénom, la localisation approximative, le type de place et votre note. Votre adresse complète n'est partagée qu'après confirmation d'une réservation."
  q6_q: "Quand Spotzy ouvre-t-il dans ma commune ?"
  q6_a: "Nous lançons d'abord à Forest et Saint-Gilles. Inscrivez-vous et nous vous avertirons dès que votre zone sera active."
