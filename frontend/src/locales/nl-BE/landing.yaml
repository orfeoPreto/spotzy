faq:
  title: "Veelgestelde vragen"
  q1_q: "Hoe bepaalt u mijn inkomsten?"
  q1_a: "U stelt zelf uw uurtarief in. Wij nemen slechts een klein platformtarief — 0% gedurende de eerste 3 maanden, daarna 10%."
  q2_q: "Wie is aansprakelijk als er iets met mijn parking gebeurt?"
  q2_a: "Spotzy biedt gastheerbescherming voor elke boeking. Onze voorwaarden dekken aansprakelijkheid tijdens de geboekte periode."
  q3_q: "Hoe word ik betaald?"
  q3_a: "Uitbetalingen gaan rechtstreeks naar uw bankrekening via Stripe Connect binnen 2-3 werkdagen na elke boeking."
  q4_q: "Kan ik datums blokkeren?"
  q4_a: "Ja — u heeft volledige controle over uw beschikbaarheidskalender. Blokkeer alle datums of tijdsloten die u nodig heeft."
  q5_q: "Welke informatie wordt publiek gedeeld?"
  q5_a: "Alleen uw voornaam, geschatte locatie, type plaats en beoordeling. Uw volledig adres wordt pas gedeeld na bevestiging van een boeking."
  q6_q: "Wanneer opent Spotzy in mijn gemeente?"
  q6_a: "We lanceren eerst in Vorst en Sint-Gillis. Schrijf u in en we verwittigen u zodra uw zone actief is."
