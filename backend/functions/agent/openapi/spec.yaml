openapi: 3.1.0
info:
  title: Spotzy Agent API
  version: 1.0.0
  description: |
    Machine-readable API for AI agents to search, quote, book, cancel, and message
    on behalf of authenticated Spotzy users.

    ## Authentication
    All endpoints require an API key in the Authorization header:
    ```
    Authorization: ApiKey sk_spotzy_live_<key>
    ```
    API keys are generated by the user in the Spotzy app under Profile → Developer → API Keys.

    ## Base URL
    `https://api.spotzy.be`

    ## Error format
    All errors follow a consistent structure:
    ```json
    {
      "error": "ERROR_CODE",
      "message": "Human-readable description",
      "details": {}
    }
    ```

servers:
  - url: https://api.spotzy.be
    description: Production

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Format: ApiKey sk_spotzy_live_<32 hex chars>"

  schemas:
    # ── Shared primitives ────────────────────────────────────────────────────

    ListingId:
      type: string
      example: lst_4f8a2b1c9d3e7f0a

    BookingId:
      type: string
      example: bkg_7e2f1a9c4b0d3e8f

    SpotType:
      type: string
      enum: [COVERED_GARAGE, CARPORT, DRIVEWAY, OPEN_SPACE]
      description: |
        - COVERED_GARAGE: Underground or multi-storey garage
        - CARPORT: Covered but open-sided
        - DRIVEWAY: Private residential driveway
        - OPEN_SPACE: Uncovered outdoor spot

    BookingStatus:
      type: string
      enum: [PENDING_PAYMENT, CONFIRMED, ACTIVE, COMPLETED, CANCELLED]

    Money:
      type: number
      format: float
      description: Amount in EUR, rounded to 2 decimal places
      example: 13.80

    ISO8601DateTime:
      type: string
      format: date-time
      example: "2026-04-11T08:00:00Z"

    # ── Listings ─────────────────────────────────────────────────────────────

    ListingSummary:
      type: object
      required: [listingId, address, spotType, pricePerHour, rating, evCharging, walkingMinutes]
      properties:
        listingId:
          $ref: "#/components/schemas/ListingId"
        address:
          type: string
          description: Street name and number (no postcode)
          example: Rue de France 14, Bruxelles
        spotType:
          $ref: "#/components/schemas/SpotType"
        spotTypeLabel:
          type: string
          description: Human-readable spot type label
          example: Covered garage
        pricePerHour:
          $ref: "#/components/schemas/Money"
          description: Hourly rate, null if not offered
          nullable: true
        pricePerDay:
          $ref: "#/components/schemas/Money"
          description: Daily rate, null if not offered
          nullable: true
        rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
          nullable: true
          description: Average rating across all reviews. null if no reviews yet.
          example: 4.8
        reviewCount:
          type: integer
          minimum: 0
          example: 12
        evCharging:
          type: boolean
          description: Whether the spot has an EV charging point
        covered:
          type: boolean
          description: Whether the spot is protected from rain (true for COVERED_GARAGE and CARPORT)
        walkingMinutes:
          type: integer
          nullable: true
          description: Estimated walking time to destination in minutes. null if no destination specified.
          example: 3
        distanceMetres:
          type: integer
          nullable: true
          description: Straight-line distance from search origin in metres
          example: 220
        availableFrom:
          $ref: "#/components/schemas/ISO8601DateTime"
          description: Earliest available slot. Only present when no start/end specified.
          nullable: true

    Quote:
      type: object
      required: [listingId, startTime, endTime, subtotalEur, platformFeeEur, totalEur, currency]
      properties:
        listingId:
          $ref: "#/components/schemas/ListingId"
        startTime:
          $ref: "#/components/schemas/ISO8601DateTime"
        endTime:
          $ref: "#/components/schemas/ISO8601DateTime"
        durationHours:
          type: number
          format: float
          example: 10.0
        subtotalEur:
          $ref: "#/components/schemas/Money"
          description: Price before platform fee
          example: 50.00
        platformFeeEur:
          $ref: "#/components/schemas/Money"
          description: Spotzy platform fee (15% of subtotal)
          example: 7.50
        totalEur:
          $ref: "#/components/schemas/Money"
          description: Total amount that will be charged
          example: 57.50
        currency:
          type: string
          enum: [EUR]
          example: EUR
        cancellationPolicy:
          type: object
          description: What refund the user would receive if they cancel, given current time
          properties:
            refundEur:
              $ref: "#/components/schemas/Money"
            refundPercent:
              type: integer
              enum: [0, 50, 100]
            rule:
              type: string
              enum: [FULL_REFUND, PARTIAL_REFUND, NO_REFUND, ACTIVE_NO_CANCEL]
              description: |
                - FULL_REFUND: >24h before start
                - PARTIAL_REFUND: 12–24h before start (50%)
                - NO_REFUND: <12h before start
                - ACTIVE_NO_CANCEL: Booking is already active

    BookingSummary:
      type: object
      required: [bookingId, confirmationRef, listingId, listingAddress, startTime, endTime, status, totalEur]
      properties:
        bookingId:
          $ref: "#/components/schemas/BookingId"
        confirmationRef:
          type: string
          description: Human-readable booking reference shown to user
          example: SPZ-2024-4471
        listingId:
          $ref: "#/components/schemas/ListingId"
        listingAddress:
          type: string
          example: Rue de France 14, Bruxelles
        spotType:
          $ref: "#/components/schemas/SpotType"
        startTime:
          $ref: "#/components/schemas/ISO8601DateTime"
        endTime:
          $ref: "#/components/schemas/ISO8601DateTime"
        status:
          $ref: "#/components/schemas/BookingStatus"
        totalEur:
          $ref: "#/components/schemas/Money"
        hostPseudo:
          type: string
          description: Host's display name
          example: Jean D.
        accessInstructions:
          type: string
          nullable: true
          description: Host-provided access instructions. Present once booking is CONFIRMED.
          example: Code for the gate is 4721. Ring the bell if it doesn't respond.

    Message:
      type: object
      required: [messageId, bookingId, senderRole, text, sentAt]
      properties:
        messageId:
          type: string
          example: msg_8a3c1f2d9e4b7a0c
        bookingId:
          $ref: "#/components/schemas/BookingId"
        senderRole:
          type: string
          enum: [HOST, GUEST, SYSTEM]
          description: Who sent the message. SYSTEM for automated messages (access codes, booking events).
        senderPseudo:
          type: string
          nullable: true
          description: Display name of sender. null for SYSTEM messages.
          example: Jean D.
        text:
          type: string
          example: "The gate code is 4721. Looking forward to hosting you!"
        sentAt:
          $ref: "#/components/schemas/ISO8601DateTime"
        isRead:
          type: boolean

    UserPreferences:
      type: object
      properties:
        covered:
          type: boolean
          nullable: true
          description: Prefer covered spots only
        evCharging:
          type: boolean
          nullable: true
          description: Prefer spots with EV charging
        accessible:
          type: boolean
          nullable: true
          description: Prefer step-free accessible spots
        maxPricePerDayEur:
          type: number
          nullable: true
          description: Maximum price per day in EUR
          example: 20.00
        maxWalkingMinutes:
          type: integer
          nullable: true
          description: Maximum acceptable walking distance in minutes
          example: 10

    ApiKey:
      type: object
      required: [keyId, name, createdAt]
      properties:
        keyId:
          type: string
          example: key_3f8a2b1c
        name:
          type: string
          description: User-defined label for this key
          example: Home assistant
        createdAt:
          $ref: "#/components/schemas/ISO8601DateTime"
        lastUsedAt:
          $ref: "#/components/schemas/ISO8601DateTime"
          nullable: true
        spendingLimitPerBookingEur:
          type: number
          nullable: true
          description: Maximum spend per single booking. null = no limit.
          example: 20.00
        monthlySpendingLimitEur:
          type: number
          nullable: true
          description: Maximum monthly spend. null = no limit.
          example: 200.00
        monthlySpendingSoFarEur:
          type: number
          description: Amount spent this calendar month via this key
          example: 45.00

    Webhook:
      type: object
      required: [webhookId, url, events, active, createdAt]
      properties:
        webhookId:
          type: string
          example: wh_5c9d3e7f0a4b2c1d
        url:
          type: string
          format: uri
          example: https://my-agent.example.com/spotzy-events
        events:
          type: array
          items:
            type: string
            enum:
              - booking.confirmed
              - booking.active
              - booking.completed
              - booking.cancelled
              - message.received
        active:
          type: boolean
        createdAt:
          $ref: "#/components/schemas/ISO8601DateTime"

    # ── Error responses ───────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: LISTING_UNAVAILABLE
        message:
          type: string
          description: Human-readable explanation
          example: This listing is not available for the requested period.
        details:
          type: object
          description: Additional context, varies by error code
          additionalProperties: true

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: UNAUTHORIZED
            message: Invalid or revoked API key.

    Forbidden:
      description: Action not permitted for this user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: NOT_FOUND
            message: The requested resource does not exist.

    UnprocessableEntity:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

# ── Paths ─────────────────────────────────────────────────────────────────────

paths:

  # ── Search ──────────────────────────────────────────────────────────────────

  /api/v1/agent/search:
    get:
      operationId: searchParking
      summary: Search for available parking spots
      description: |
        Returns listings near a location, optionally filtered by date/time, price, and spot features.
        The API expects coordinates (lat/lng). If you have a natural-language location, geocode it
        first using the Mapbox Geocoding API, or use the Spotzy MCP server which handles geocoding automatically.

        When startTime and endTime are provided, only listings available for the full requested period
        are returned. When omitted, listings with any availability in the next 30 days are returned.
      tags: [Listings]
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: float
            minimum: -90
            maximum: 90
          description: Latitude of search origin
          example: 50.835
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: float
            minimum: -180
            maximum: 180
          description: Longitude of search origin
          example: 4.337
        - name: startTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ISO8601DateTime"
          description: Start of requested parking period (ISO 8601). Required if endTime is provided.
        - name: endTime
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ISO8601DateTime"
          description: End of requested parking period (ISO 8601). Required if startTime is provided.
        - name: maxPricePerDayEur
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Maximum daily price in EUR
          example: 15.00
        - name: spotType
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/SpotType"
          style: form
          explode: false
          description: "Comma-separated list of accepted spot types. Example: COVERED_GARAGE,CARPORT"
        - name: evCharging
          in: query
          required: false
          schema:
            type: boolean
          description: If true, only return spots with EV charging
        - name: covered
          in: query
          required: false
          schema:
            type: boolean
          description: If true, only return covered spots (COVERED_GARAGE or CARPORT)
        - name: accessible
          in: query
          required: false
          schema:
            type: boolean
          description: If true, only return step-free accessible spots
        - name: maxWalkingMinutes
          in: query
          required: false
          schema:
            type: integer
          description: Maximum walking time in minutes from search origin
          example: 10
        - name: usePreferences
          in: query
          required: false
          schema:
            type: boolean
          description: If true, apply the authenticated user's saved preferences (see GET /api/v1/agent/preferences). Explicit query parameters override preference values.
        - name: destinationLat
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Latitude of destination for walking distance calculation. Defaults to search origin if omitted.
        - name: destinationLng
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Longitude of destination for walking distance calculation.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          description: Maximum number of results to return
        - name: radiusMetres
          in: query
          required: false
          schema:
            type: integer
            minimum: 100
            maximum: 10000
            default: 2000
          description: Search radius from origin in metres
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [listings, total]
                properties:
                  listings:
                    type: array
                    items:
                      $ref: "#/components/schemas/ListingSummary"
                  total:
                    type: integer
                    description: Total number of matching listings (may exceed listings array length if paginated)
                    example: 7
              example:
                listings:
                  - listingId: lst_4f8a2b1c9d3e7f0a
                    address: Rue de France 14, Bruxelles
                    spotType: COVERED_GARAGE
                    spotTypeLabel: Covered garage
                    pricePerHour: 5.00
                    pricePerDay: 12.00
                    rating: 4.8
                    reviewCount: 24
                    evCharging: false
                    covered: true
                    walkingMinutes: 3
                    distanceMetres: 220
                total: 7
        "400":
          description: Invalid parameters (e.g. missing lat/lng, startTime without endTime)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingCoords:
                  value:
                    error: VALIDATION_ERROR
                    message: lat and lng are required.
                invalidPeriod:
                  value:
                    error: VALIDATION_ERROR
                    message: endTime must be after startTime.
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Quote ───────────────────────────────────────────────────────────────────

  /api/v1/agent/listings/{listingId}/quote:
    get:
      operationId: getQuote
      summary: Get exact price for a listing and period
      description: |
        Returns the exact price breakdown for booking a specific listing for a specific period.
        This call is idempotent — it has no side effects and does not reserve the listing.

        **Always call this before calling POST /api/v1/agent/bookings** and present the
        totalEur to the user for confirmation.
      tags: [Listings]
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ListingId"
        - name: startTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ISO8601DateTime"
        - name: endTime
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ISO8601DateTime"
      responses:
        "200":
          description: Price quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
              example:
                listingId: lst_4f8a2b1c9d3e7f0a
                startTime: "2026-04-11T08:00:00Z"
                endTime: "2026-04-11T18:00:00Z"
                durationHours: 10.0
                subtotalEur: 50.00
                platformFeeEur: 7.50
                totalEur: 57.50
                currency: EUR
                cancellationPolicy:
                  refundEur: 57.50
                  refundPercent: 100
                  rule: FULL_REFUND
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: NOT_FOUND
                message: Listing not found.
        "409":
          description: Listing unavailable for the requested period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: LISTING_UNAVAILABLE
                message: This listing is fully booked for the requested period.

  # ── Bookings ─────────────────────────────────────────────────────────────────

  /api/v1/agent/bookings:
    post:
      operationId: createBooking
      summary: Book and pay for a parking spot
      description: |
        Single-shot booking — validates availability, charges the user's saved payment method,
        and returns the confirmed booking. No multi-step wizard.

        **Important**: Always call GET /api/v1/agent/listings/{listingId}/quote first and
        present the price to the user before calling this endpoint. The user should confirm
        the total before the charge is made.

        The user's default Stripe payment method on file is charged automatically.
        If no payment method is saved, the call returns 402 PAYMENT_METHOD_REQUIRED.
      tags: [Bookings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId, startTime, endTime]
              properties:
                listingId:
                  $ref: "#/components/schemas/ListingId"
                startTime:
                  $ref: "#/components/schemas/ISO8601DateTime"
                endTime:
                  $ref: "#/components/schemas/ISO8601DateTime"
            example:
              listingId: lst_4f8a2b1c9d3e7f0a
              startTime: "2026-04-11T08:00:00Z"
              endTime: "2026-04-11T18:00:00Z"
      responses:
        "201":
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingSummary"
              example:
                bookingId: bkg_7e2f1a9c4b0d3e8f
                confirmationRef: SPZ-2024-4471
                listingId: lst_4f8a2b1c9d3e7f0a
                listingAddress: Rue de France 14, Bruxelles
                spotType: COVERED_GARAGE
                startTime: "2026-04-11T08:00:00Z"
                endTime: "2026-04-11T18:00:00Z"
                status: CONFIRMED
                totalEur: 57.50
                hostPseudo: Jean D.
                accessInstructions: null
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Payment or spending limit issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                noPaymentMethod:
                  value:
                    error: PAYMENT_METHOD_REQUIRED
                    message: No saved payment method on file. The user must add a card via the Spotzy app.
                perBookingLimitExceeded:
                  value:
                    error: SPENDING_LIMIT_EXCEEDED
                    message: This booking (€57.50) exceeds your per-booking spending limit (€20.00).
                    details:
                      bookingTotalEur: 57.50
                      limitEur: 20.00
                      limitType: PER_BOOKING
                monthlyLimitExceeded:
                  value:
                    error: SPENDING_LIMIT_EXCEEDED
                    message: This booking would exceed your monthly spending limit.
                    details:
                      bookingTotalEur: 57.50
                      monthlySpentEur: 180.00
                      limitEur: 200.00
                      limitType: MONTHLY
        "403":
          description: Self-booking attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: CANNOT_BOOK_OWN_LISTING
                message: You cannot book your own listing.
        "409":
          description: Listing no longer available (race condition)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: LISTING_UNAVAILABLE
                message: This listing was just booked by another user. Please search again.

    get:
      operationId: listBookings
      summary: List the user's upcoming and active bookings
      description: |
        Returns bookings with status CONFIRMED or ACTIVE, sorted by startTime ascending.
        Does not return COMPLETED or CANCELLED bookings by default — use the status filter for those.
      tags: [Bookings]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/BookingStatus"
          style: form
          explode: false
          description: "Filter by status. Default: CONFIRMED,ACTIVE"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: object
                required: [bookings, total]
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookingSummary"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/agent/bookings/{bookingId}/cancel:
    post:
      operationId: cancelBooking
      summary: Cancel a booking
      description: |
        Cancels a booking and initiates the appropriate refund per the cancellation policy:
        - More than 24h before start: full refund
        - 12–24h before start: 50% refund
        - Less than 12h before start: no refund
        - Booking already ACTIVE: cannot be cancelled

        The refundEur in the response is the amount that will be returned to the user's card.
        **Present this to the user and require confirmation before calling this endpoint.**
      tags: [Bookings]
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BookingId"
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                type: object
                required: [bookingId, status, refundEur, refundPercent, policy]
                properties:
                  bookingId:
                    $ref: "#/components/schemas/BookingId"
                  status:
                    type: string
                    enum: [CANCELLED]
                  refundEur:
                    $ref: "#/components/schemas/Money"
                    description: Amount refunded to user's card
                  refundPercent:
                    type: integer
                    enum: [0, 50, 100]
                  policy:
                    type: string
                    enum: [FULL_REFUND, PARTIAL_REFUND, NO_REFUND]
                  refundEstimatedArrival:
                    type: string
                    description: Estimated time for refund to appear on card
                    example: 5–10 business days
              example:
                bookingId: bkg_7e2f1a9c4b0d3e8f
                status: CANCELLED
                refundEur: 28.75
                refundPercent: 50
                policy: PARTIAL_REFUND
                refundEstimatedArrival: 5–10 business days
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not the booking owner, or booking is ACTIVE (cannot cancel)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notOwner:
                  value:
                    error: FORBIDDEN
                    message: You do not have permission to cancel this booking.
                alreadyActive:
                  value:
                    error: BOOKING_ACTIVE_NO_CANCEL
                    message: Active bookings cannot be cancelled. Contact support if there is an emergency.
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Booking already cancelled or completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: BOOKING_ALREADY_ENDED
                message: This booking has already been cancelled or completed.

  # ── Messages ─────────────────────────────────────────────────────────────────

  /api/v1/agent/bookings/{bookingId}/messages:
    get:
      operationId: getMessages
      summary: Get message history for a booking
      description: Returns all chat messages for the specified booking, sorted by sentAt ascending.
      tags: [Messages]
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BookingId"
        - name: since
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ISO8601DateTime"
          description: Only return messages sent after this time. Use for polling for new messages.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                type: object
                required: [messages, bookingId]
                properties:
                  bookingId:
                    $ref: "#/components/schemas/BookingId"
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
              example:
                bookingId: bkg_7e2f1a9c4b0d3e8f
                messages:
                  - messageId: msg_8a3c1f2d9e4b7a0c
                    bookingId: bkg_7e2f1a9c4b0d3e8f
                    senderRole: HOST
                    senderPseudo: Jean D.
                    text: "The gate code is 4721. Looking forward to hosting you!"
                    sentAt: "2026-04-10T14:32:00Z"
                    isRead: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not a participant in this booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: sendMessage
      summary: Send a message to the other party in a booking
      description: |
        Sends a plain-text message to the Host (if called by Guest) or to the Guest
        (if called by Host). Plain text only — no HTML, no markdown.

        Only participants in the booking (Host or Guest) can send messages.
      tags: [Messages]
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BookingId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: Plain text message. No HTML or markdown.
            example:
              text: "Hi, will the gate code be ready for my arrival at 8am?"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
              example:
                messageId: msg_9b4d2e3f0a5c8b1d
                bookingId: bkg_7e2f1a9c4b0d3e8f
                senderRole: GUEST
                senderPseudo: Marc B.
                text: "Hi, will the gate code be ready for my arrival at 8am?"
                sentAt: "2026-04-10T12:00:00Z"
                isRead: false
        "400":
          description: Empty message or text too long
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not a participant in this booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Preferences ──────────────────────────────────────────────────────────────

  /api/v1/agent/preferences:
    get:
      operationId: getPreferences
      summary: Get the user's saved booking preferences
      description: Returns the preferences used when usePreferences=true in a search call.
      tags: [Preferences]
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
              example:
                covered: true
                evCharging: false
                accessible: null
                maxPricePerDayEur: 20.00
                maxWalkingMinutes: 10
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      operationId: setPreferences
      summary: Update the user's booking preferences
      description: |
        Replaces the user's saved preferences. All fields are optional — omitted fields
        are set to null (no preference). Send null explicitly to clear a preference.
      tags: [Preferences]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferences"
            example:
              covered: true
              evCharging: false
              maxPricePerDayEur: 20.00
              maxWalkingMinutes: 10
      responses:
        "200":
          description: Preferences saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "400":
          $ref: "#/components/responses/UnprocessableEntity"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── API Keys ──────────────────────────────────────────────────────────────────

  /api/v1/agent/keys:
    get:
      operationId: listApiKeys
      summary: List the user's API keys
      description: Returns all API keys for the authenticated user. Key values are never returned — only metadata.
      tags: [API Keys]
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createApiKey
      summary: Generate a new API key
      description: |
        Creates a new API key for the authenticated user. The full key value (`sk_spotzy_live_...`)
        is returned **only once** in this response. It is not stored and cannot be retrieved again.
        The user must copy it immediately.
      tags: [API Keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: A label to identify where this key is used
                  example: Home assistant
                spendingLimitPerBookingEur:
                  type: number
                  nullable: true
                  description: Maximum spend per booking in EUR. null = no limit.
                monthlySpendingLimitEur:
                  type: number
                  nullable: true
                  description: Maximum monthly spend in EUR. null = no limit.
      responses:
        "201":
          description: API key created. Copy the key value now — it will not be shown again.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiKey"
                  - type: object
                    required: [key]
                    properties:
                      key:
                        type: string
                        description: The full API key value. Shown once only.
                        example: sk_spotzy_live_4f8a2b1c9d3e7f0a2b3c4d5e6f7a8b9c
        "400":
          $ref: "#/components/responses/UnprocessableEntity"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/agent/keys/{keyId}:
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key
      description: Immediately revokes the key. Any subsequent requests using this key will return 401.
      tags: [API Keys]
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                required: [keyId, revokedAt]
                properties:
                  keyId:
                    type: string
                  revokedAt:
                    $ref: "#/components/schemas/ISO8601DateTime"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: This key belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Webhooks ──────────────────────────────────────────────────────────────────

  /api/v1/agent/webhooks:
    get:
      operationId: listWebhooks
      summary: List registered webhook endpoints
      tags: [Webhooks]
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: object
                required: [webhooks]
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: registerWebhook
      summary: Register a webhook endpoint
      description: |
        Registers a URL to receive signed event payloads when booking events occur.

        The `signingSecret` is returned **only once** in this response. Store it securely —
        use it to verify the `Spotzy-Signature` header on incoming webhook requests.

        **Verifying signatures:**
        ```
        expected = "sha256=" + HMAC-SHA256(signingSecret, requestBody)
        if (Spotzy-Signature header !== expected) reject the request
        ```
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                  description: HTTPS endpoint that will receive webhook payloads
                  example: https://my-agent.example.com/spotzy-events
                events:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum:
                      - booking.confirmed
                      - booking.active
                      - booking.completed
                      - booking.cancelled
                      - message.received
      responses:
        "201":
          description: Webhook registered. Copy the signingSecret now — it will not be shown again.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Webhook"
                  - type: object
                    required: [signingSecret]
                    properties:
                      signingSecret:
                        type: string
                        description: Use this to verify incoming webhook signatures. Shown once only.
                        example: whsec_8a3c1f2d9e4b7a0c5d6e7f8a9b0c1d2e
              example:
                webhookId: wh_5c9d3e7f0a4b2c1d
                url: https://my-agent.example.com/spotzy-events
                events: [booking.confirmed, booking.cancelled]
                active: true
                createdAt: "2026-04-11T10:00:00Z"
                signingSecret: whsec_8a3c1f2d9e4b7a0c5d6e7f8a9b0c1d2e
        "400":
          description: Invalid URL or unrecognised event type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/agent/webhooks/{webhookId}:
    delete:
      operationId: deleteWebhook
      summary: Remove a webhook endpoint
      description: Immediately deregisters the webhook. No further events will be delivered to it.
      tags: [Webhooks]
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                type: object
                required: [webhookId, deletedAt]
                properties:
                  webhookId:
                    type: string
                  deletedAt:
                    $ref: "#/components/schemas/ISO8601DateTime"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: This webhook belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

# ── Webhook payload schemas (for documentation — not API endpoints) ────────────
#
# All webhook payloads share a common envelope:
# {
#   "event": "booking.confirmed",
#   "timestamp": "2026-04-11T08:00:00Z",
#   "data": { <event-specific payload> }
# }
#
# booking.confirmed:
#   bookingId, confirmationRef, listingId, listingAddress, spotType,
#   startTime, endTime, totalEur, hostPseudo
#
# booking.active:
#   bookingId, listingAddress, startTime, endTime, accessInstructions (nullable)
#
# booking.completed:
#   bookingId, listingAddress, startTime, endTime, durationHours, totalEur
#
# booking.cancelled:
#   bookingId, listingAddress, startTime, endTime, refundEur, refundPercent, policy
#
# message.received:
#   bookingId, messageId, senderRole, senderPseudo, text, sentAt
#
# Delivery headers on each request:
#   Content-Type: application/json
#   Spotzy-Signature: sha256=<HMAC-SHA256(signingSecret, rawBody)>
#   Spotzy-Event: booking.confirmed
#   Spotzy-Delivery-Id: <unique delivery attempt ID>
#
# Retry policy: 3 attempts with exponential backoff (1min, 5min, 30min).
# Return 2xx to acknowledge. Any other status triggers a retry.

tags:
  - name: Listings
    description: Search listings and get price quotes
  - name: Bookings
    description: Create, list, and cancel bookings
  - name: Messages
    description: Read and send messages within a booking
  - name: Preferences
    description: Manage user booking preferences
  - name: API Keys
    description: Manage API keys for programmatic access
  - name: Webhooks
    description: Register endpoints to receive booking event notifications
